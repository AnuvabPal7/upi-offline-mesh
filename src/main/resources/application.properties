# Server
server.port=8080

# MySQL database (Railway)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logging
logging.level.com.demo.upimesh=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Idempotency window (how long a packet hash is remembered)
upi.mesh.idempotency-ttl-seconds=86400

# Packet freshness window — anything older than this is rejected as replay
upi.mesh.packet-max-age-seconds=86400
bridge.api.key=${BRIDGE_API_KEY}